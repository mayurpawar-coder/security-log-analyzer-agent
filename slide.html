<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    background: #0a0e1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    text-align: center;
    padding: 60px 80px;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    background: #0d1626;
  }
  .emoji { font-size: 64px; margin-bottom: 20px; }
  h1 { color: #4fc3f7; font-size: 36px; margin: 0 0 10px; }
  .sub { color: #90caf9; font-size: 20px; margin: 8px 0; }
  .name { color: #ffffff; font-size: 22px; margin-top: 24px; font-weight: 600; }
  .college { color: #78909c; font-size: 16px; margin-top: 6px; }
  .badge {
    display: inline-block;
    margin-top: 24px;
    padding: 8px 20px;
    background: #1565c0;
    color: #90caf9;
    border-radius: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🔐</div>
  <h1>Security Log Analyzer Agent</h1>
  <div class="sub">AI-powered threat detection using Google ADK + MCP</div>
  <div class="name">Mayur Pawar</div>
  <div class="college">BCA Student · Deogiri College · Chhatrapati Sambhajinagar</div>
  <div class="badge">Kaggle AI Agents Capstone 2026 · Agents for Business</div>
</div>
</body>
</html>
